version: "3.8"

services:
  mie-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mie-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_AI_API_KEY=${GEMINI_AI_API_KEY}
      - ENV=${ENV:-DEV}
      - BOT_ONLY=${BOT_ONLY:-true}
      - OOPS_WEBHOOK_URL=${OOPS_WEBHOOK_URL}
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app/
    networks:
      - mie-network
    entrypoint: ["uv", "run"]
    command: ["python", "main.py"]

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: discord_bot
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mie-network
    ports:
      - "27017:27017"

volumes:
  mongo_data:
networks:
  mie-network:
    driver: bridge
    attachable: true
